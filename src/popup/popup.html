<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>tabehameha</title>
  <style>
    body { width: 340px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f8f9fa; color: #333; }
    .popup-wrapper { padding: 16px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e9ecef; }
    h1 { font-size: 1.25rem; margin: 0; color: #1a1a2e; font-weight: 800; }
    .btn-sweep { padding: 6px 12px; background: #4a90e2; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .vault-container { background: #fff; border-radius: 8px; border: 1px solid #e9ecef; box-shadow: 0 2px 6px rgba(0,0,0,0.02); display: flex; flex-direction: column; max-height: 320px; }
    .vault-header { padding: 10px; background: #f1f3f5; border-bottom: 1px solid #e9ecef; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; font-weight: 600; }
    .vault-bulk-actions { display: flex; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #e9ecef; background: #fafbfc; justify-content: space-between; }
    .bulk-btn { background: none; border: none; font-weight: 600; cursor: pointer; font-size: 0.75rem; padding: 0; }
    #restoreAllBtn { color: #4a90e2; }
    #purgeAllBtn { color: #adb5bd; font-weight: 500; }
    #purgeAllBtn:hover { color: #dc3545; }
    .search-box { width: 100%; padding: 8px; border: none; border-bottom: 1px solid #e9ecef; box-sizing: border-box; font-size: 0.85rem; outline: none; }
    .vault-list { overflow-y: auto; flex: 1; min-height: 120px; list-style: none; margin: 0; padding: 0; }
    .vault-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #f8f9fa; font-size: 0.85rem; }
    .vault-item:hover { background-color: #f8f9fa; }
    .tab-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; cursor: pointer; }
    .tab-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #495057; }
    .btn-delete { background: none; border: none; color: #adb5bd; cursor: pointer; font-size: 1rem; padding: 0 4px; }
    .btn-delete:hover { color: #dc3545; }
    .empty-state { text-align: center; color: #adb5bd; padding: 35px 10px; font-size: 0.85rem; }
    footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.8rem; }
    footer a { color: #4a90e2; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<div class="popup-wrapper">
  <header>
    <h1>⚡ tabehameha</h1>
    <button id="manualSweep" class="btn-sweep">Sweep Now</button>
  </header>

  <div class="vault-container">
    <div class="vault-header">
      <span>🔒 Inactivity Vault</span>
      <span id="vaultCount" style="background: #dee2e6; padding: 2px 6px; border-radius: 10px; font-size: 0.75rem;">0</span>
    </div>

    <div id="vaultBulkActions" class="vault-bulk-actions">
      <button id="restoreAllBtn" class="bulk-btn">⚡ Restore All</button>
      <button id="purgeAllBtn" class="bulk-btn">❌ Clear Vault</button>
    </div>

    <div id="vaultDisabledMessage" class="empty-state" style="display: none; padding: 45px 10px;">
      The Vault feature is disabled in extension options.
    </div>

    <input type="text" id="searchVault" class="search-box" placeholder="Search archived tabs...">

    <ul id="vaultList" class="vault-list">
      <!-- Built dynamically via Javascript -->
    </ul>
  </div>

  <footer>
    <span>RAM Optimization Active</span>
    <a href="#" id="openOptions">Settings ⚙️</a>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
